<!-- Example: Access a shareable review card -->
<!-- Visit: http://localhost:8000/api/share/{review_id}/card -->
<!DOCTYPE html>
<html>
<head>
    <title>Share a Review</title>
</head>
<body>
    <h1>Share Review Cards</h1>
    <p>Access shareable review cards at:</p>
    <code>GET /api/share/{review_id}/card</code>
    <p>Export all reviews:</p>
    <code>GET /api/share/batch?format=csv</code>
    <code>GET /api/share/batch?format=json&min_rating=4</code>
</body>
</html>
